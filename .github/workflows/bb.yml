name: Build Telegram Web

on:
  workflow_dispatch:
    inputs:
      telegram_api_id:
        description: 'TELEGRAM_API_ID'
        required: true
        type: string
      telegram_api_hash:
        description: 'TELEGRAM_API_HASH'
        required: true
        type: string
      base_url:
        description: 'BASE_URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # 使用正确的 Node.js 版本
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      # 清理有问题的 NODE_OPTIONS
      - name: Clean environment
        run: |
          unset NODE_OPTIONS
          echo "NODE_OPTIONS cleared"
          
      - name: Install dependencies
        run: |
          # 使用 --legacy-peer-deps 忽略 peer dependency 警告
          npm ci --legacy-peer-deps
        
      - name: Create env file
        run: |
          echo "TELEGRAM_API_ID=${{ inputs.telegram_api_id }}" > .env
          echo "TELEGRAM_API_HASH=${{ inputs.telegram_api_hash }}" >> .env
          echo "BASE_URL=${{ inputs.base_url }}" >> .env
      
      - name: Build
        run: npm run build:production
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "build-$(date +%s)"
          name: "Build $(date '+%Y-%m-%d')"
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
