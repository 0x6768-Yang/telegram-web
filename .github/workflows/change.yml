name: Quick Domain Replace
on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Your domain'
        required: true
        type: string

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Replace domains
        run: |
          DOMAIN="${{ inputs.domain }}"
          
          # 设置 Git
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # 1. 更新 Utils.ts
          sed -i "s/web\.telegram\.org/$DOMAIN/g" src/lib/gramjs/Utils.ts
          
          # 2. 更新 config.ts（如果存在）
          [ -f src/config.ts ] && sed -i "s/web\.telegram\.org/$DOMAIN/g" src/config.ts
          [ -f src/config.ts ] && sed -i "s/telegram\.org/$DOMAIN/g" src/config.ts
          
          # 3. 添加域名到白名单
          sed -i "/whitelistedDomains: \[/a\    \"$DOMAIN\"," src/limits.ts
          
      - name: Push changes
        run: |
          git add src/
          git commit -m "Update domain to ${{ inputs.domain }}" || echo "No changes"
          git push
